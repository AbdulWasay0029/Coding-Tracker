# Fly.io deployment config for CodeSync Discord Bot
# Deploy with: fly deploy
# Set secrets with: fly secrets set KEY=value

app = "codesync-bot"         # Change this if the name is taken on Fly.io
primary_region = "sin"       # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

# HTTP service — Fly.io needs this to keep the machine alive (health check only)
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false   # IMPORTANT: don't stop between Discord commands
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
