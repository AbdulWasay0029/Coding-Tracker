# fly.toml configuration file for CodeSync Bot

app = "codesync-bot"
primary_region = "bom" # Mumbai, closest to you

[build]
  dockerfile = "Dockerfile"

[env]
  # Fallback for production (secrets should use 'fly secrets set')
  NODE_ENV = "production"

# No services/ports are exposed because it's a Discord bot (outbound only)
# This keeps the bot private and secure.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  # You can remove these if Fly complains about no healthy machines
  # But for a pure bot, usually you skip HTTP services.

[checks]
  # No health checks needed for a worker-style bot

[vm]
  size = "shared-cpu-1x"
  memory = "256mb" # 256MB is enough for a Discord bot
